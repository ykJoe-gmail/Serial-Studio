#-------------------------------------------------------------------------------
# Workflow configuration
#-------------------------------------------------------------------------------

name: Deploy

on:
  push:               # Run on push
    paths-ignore:     # File patterns to ignore
    - '**.md'         # Ignore changes to *.md files

  pull_request:       # Run on pull-request
    paths-ignore:     # File-patterns to ignore
    - '**.md'         # Ignore changes to *.md files

#-------------------------------------------------------------------------------
# Define application name & version
#-------------------------------------------------------------------------------

env:
  VERSION: "3.2.5"
  QT_VERSION_LINUX: 6.10.2
  QT_VERSION_MACOS: 6.10.2
  QT_VERSION_WINDOWS: 6.10.2
  EXECUTABLE: "Serial-Studio-Community"
  APPLICATION: "Serial Studio Community"
  UNIXNAME: "serial-studio-community"
  QML_DIR: "../../app/qml"
  PUBLISHER: "ykjoe"
  INSTALL_QT_MACOS: true
  INSTALL_QT_WINDOWS: true
  INSTALL_QT_LINUX_INTEL: true
  INSTALL_QT_LINUX_ARM64: true
  QTFRAMEWORK_BYPASS_LICENSE_CHECK: "true"
  DESCRIPTION: "Multi-purpose serial data visualization & processing program"

#-------------------------------------------------------------------------------
# Begin workflow jobs definition
#-------------------------------------------------------------------------------

jobs:

#-------------------------------------------------------------------------------
# GNU/Linux build (x86_64)
#-------------------------------------------------------------------------------

  build-linux:
    runs-on: ubuntu-22.04
    name: '🐧 Linux'
    steps:
    - name: '🧰 Checkout'
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    - name: '⚙️ Install dependencies'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          fakeroot \
          libcups2-dev \
          libegl1 \
          libfuse2 \
          libgl1-mesa-dev \
          libasound2-dev \
          libssl-dev \
          libudev-dev \
          libzstd-dev \
          zlib1g-dev \
          libexpat1-dev \
          libminizip-dev \
          libopus-dev \
          rpm \
          libxcb1 \
          libxcb-cursor0 \
          libxcb-cursor-dev \
          libxcb-glx0 \
          libxcb-icccm4 \
          libxcb-image0 \
          libxcb-image0-dev \
          libxcb-keysyms1 \
          libxcb-randr0 \
          libxcb-render0 \
          libxcb-render-util0 \
          libxcb-shape0 \
          libxcb-shm0 \
          libxcb-sync1 \
          libxcb-util0-dev \
          libxcb-util1 \
          libxcb-xfixes0 \
          libxcb-xinerama0 \
          libxcb-xkb-dev \
          libxcb-xtest0 \
          libxkbcommon-dev \
          libxkbcommon-x11-0 \
          libxkbcommon-x11-dev

    - name: '⚙️ Restore Qt Cache'
      uses: actions/cache/restore@v3
      if: env.INSTALL_QT_LINUX_INTEL == 'false'
      with:
        path: |
          ${{github.workspace}}/Qt-${{env.QT_VERSION_LINUX}}-${{runner.os}}-x64
          ${{env.USERPROFILE}}/.qt-license
        key: qt-${{runner.os}}-${{env.QT_VERSION_LINUX}}-x64

    # - name: '⚙️ Install Qt'
    #   shell: bash
    #   if: env.INSTALL_QT_LINUX_INTEL == 'true'
    #   env:
    #     QT_VERSION: ${{env.QT_VERSION_LINUX}}
    #     QT_ARCH: x64
    #     QT_USERNAME: ${{secrets.QT_USERNAME}}
    #     QT_PASSWORD: ${{secrets.QT_PASSWORD}}
    #     QT_OUTPUT_DIR: ${{github.workspace}}/Qt-${{env.QT_VERSION_LINUX}}-${{runner.os}}-x64
    #   run: |
    #     chmod +x ./scripts/install-qt.sh
    #     ./scripts/install-qt.sh

    - name: '⚙️ Install Qt'
      shell: bash
      if: env.INSTALL_QT_LINUX_INTEL == 'true'
      run: |
        pip install aqtinstall
        TARGET_PATH="${{ github.workspace }}/Qt-${{ env.QT_VERSION_LINUX }}-${{ runner.os }}-x64"
        mkdir -p "$TARGET_PATH"
        
        # 尝试安装。如果 6.10.2 的基础包找不到，尝试使用次新版本作为 fallback 或检查架构名
        aqt install-qt linux desktop ${{ env.QT_VERSION_LINUX }} gcc_64 --outputdir "$TARGET_PATH" \
          -m qtcharts qt5compat qtmultimedia qtserialport qtgraphs qtpositioning \
             qtquick3d qtshadertools qtconnectivity qtwebengine qtwebchannel qtpdf || \
        aqt install-qt linux desktop ${{ env.QT_VERSION_LINUX }} gcc_64 --outputdir "$TARGET_PATH"

    - name: '🔍 Debug: Find Qt6Config.cmake & Inspect Qt Repo'
      shell: bash
      if: always() # 即使前面的步骤失败了，也运行这个 Debug，方便看报错原因
      run: |
        echo "=========================================================="
        echo "📂 Current Workspace: ${{ github.workspace }}"
        echo "📂 Expected Root: ${{ github.workspace }}/Qt-${{ env.QT_VERSION_LINUX }}-${{ runner.os }}-x64"
        
        echo "--- 🛠️ 1. Checking aqtinstall Repository for ${{ env.QT_VERSION_LINUX }} ---"
        # 探测官方到底有没有给这个版本放包
        pip install aqtinstall --quiet
        echo "Available Architectures for ${{ env.QT_VERSION_LINUX }}:"
        aqt list-qt linux desktop --arch ${{ env.QT_VERSION_LINUX }} || echo "❌ No architectures found for ${{ env.QT_VERSION_LINUX }}"
        
        echo "--- 🔍 2. Searching for Qt6Config.cmake ---"
        # 看看文件到底装没装上，躲在哪
        find ${{ github.workspace }} -name "Qt6Config.cmake"
        
        echo "--- 📂 3. Directory Tree (Depth 4) ---"
        # 打印目录树，直观确认 aqt 的安装路径结构
        find ${{ github.workspace }} -maxdepth 4 -not -path '*/.*'
        echo "=========================================================="

    - name: '🕵️ 深度排查：Qt 到底去哪了？'
      shell: bash
      if: always()
      run: |
        echo "--- 📋 1. 确认 aqt 实际看到的版本详情 ---"
        # 不加 quiet，看完整的版本解析
        aqt list-qt linux desktop --arch 6.10.2
        
        echo "--- 📋 2. 检查 aqt 安装日志 (如果有) ---"
        # 看看根目录下有没有 aqtinstall.log，有的报错会写在那
        [ -f aqtinstall.log ] && cat aqtinstall.log || echo "No log file found."
        
        echo "--- 🔍 3. 全系统搜索 Qt6Config.cmake (无视路径) ---"
        # 这一行如果还是空的，说明 aqt install 步骤 100% 失败了
        sudo find / -name "Qt6Config.cmake" 2>/dev/null || echo "❌ 全盘搜索失败，Qt 根本没装上"
        
        echo "--- 📂 4. 检查当前目录下所有文件夹 (层级 2) ---"
        ls -R | grep ":$" | head -n 20

    - name: '⚙️ Save Qt Cache'
      if: env.INSTALL_QT_LINUX_INTEL == 'true'
      uses: actions/cache/save@v3
      with:
        path: |
          ${{github.workspace}}/Qt-${{env.QT_VERSION_LINUX}}-${{runner.os}}-x64
          ${{env.USERPROFILE}}/.qt-license
        key: qt-${{runner.os}}-${{env.QT_VERSION_LINUX}}-x64

    - name: '⚙️ Add Qt to PATH'
      shell: bash
      env:
        QT_VERSION: ${{env.QT_VERSION_LINUX}}
        QT_OUTPUT_DIR: ${{github.workspace}}/Qt-${{env.QT_VERSION_LINUX}}-${{runner.os}}-x64
      run: |
        export QT_BIN_PATH="${QT_OUTPUT_DIR}/${QT_VERSION}/gcc_64/bin"
        export QT_LIBEXEC_PATH="${QT_OUTPUT_DIR}/${QT_VERSION}/gcc_64/libexec"
        export CMAKE_PREFIX_PATH="${QT_OUTPUT_DIR}/${QT_VERSION}/gcc_64/lib/cmake"

        echo "$QT_BIN_PATH" >> $GITHUB_PATH
        echo "$QT_LIBEXEC_PATH" >> $GITHUB_PATH
        echo "CMAKE_PREFIX_PATH=$CMAKE_PREFIX_PATH" >> $GITHUB_ENV

    - name: '⚙️ Install CMake'
      uses: lukka/get-cmake@latest
      with:
        useLocalCache: true

    - name: '🚧 Configure with CMake'
      env:
        ARCGIS_API_KEY: ${{secrets.ARCGIS_API_KEY}}
        SERIAL_STUDIO_LICENSE_KEY: ${{secrets.SERIAL_STUDIO_LICENSE_KEY}}
        SERIAL_STUDIO_INSTANCE_ID: ${{secrets.SERIAL_STUDIO_INSTANCE_ID}}
      run: |
        mkdir build
        cd build
        cmake ../ \
          -DPRODUCTION_OPTIMIZATION=ON \
          -DENABLE_HARDENING=ON \
          -DCMAKE_BUILD_TYPE=Release \
          -DBUILD_COMMERCIAL=ON \
          -DBUILD_GPL3=OFF

    - name: '🚧 Build application'
      run: |
        cd build
        cmake --build . --config Release -j 16

    - name: '📦 Create AppImage'
      run: |
        cd "build/app"
        wget https://github.com/linuxdeploy/linuxdeploy/releases/download/1-alpha-20240109-1/linuxdeploy-x86_64.AppImage
        #wget https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
        wget https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
        chmod +x linuxdeploy-x86_64.AppImage
        chmod +x linuxdeploy-plugin-qt-x86_64.AppImage

        export QML_SOURCES_PATHS="${{env.QML_DIR}}"
        export EXTRA_QT_MODULES="webengine"

        ./linuxdeploy-x86_64.AppImage --appdir AppDir -e ${{env.UNIXNAME}} -i ../../app/deploy/linux/${{env.UNIXNAME}}.svg -d ../../app/deploy/linux/${{env.UNIXNAME}}.desktop --plugin qt --output appimage

        QT_BASE="${{github.workspace}}/Qt-${{env.QT_VERSION_LINUX}}-${{runner.os}}-x64/${{env.QT_VERSION_LINUX}}/gcc_64"
        QT_PLUGINS_PATH="${QT_BASE}/plugins"

        mkdir -p AppDir/usr/plugins/canbus
        if [ -d "$QT_PLUGINS_PATH/canbus" ]; then
          cp -r "$QT_PLUGINS_PATH/canbus/"* AppDir/usr/plugins/canbus/ || echo "Warning: Could not copy canbus plugins"
        else
          echo "Warning: Qt canbus plugins not found at $QT_PLUGINS_PATH/canbus"
        fi

        mkdir -p AppDir/usr/libexec
        cp -f "${QT_BASE}/libexec/QtWebEngineProcess" AppDir/usr/libexec/ || echo "Warning: QtWebEngineProcess not found"

        mkdir -p AppDir/usr/resources
        cp -f "${QT_BASE}/resources/"*.pak AppDir/usr/resources/ 2>/dev/null || echo "Warning: WebEngine .pak files not found"
        cp -f "${QT_BASE}/resources/icudtl.dat" AppDir/usr/resources/ 2>/dev/null || true

        mkdir -p AppDir/usr/translations/qtwebengine_locales
        cp -f "${QT_BASE}/translations/qtwebengine_locales/"*.pak AppDir/usr/translations/qtwebengine_locales/ 2>/dev/null || true

        ./linuxdeploy-x86_64.AppImage --appdir AppDir --output appimage

        rm linuxdeploy-x86_64.AppImage
        rm linuxdeploy-plugin-qt-x86_64.AppImage

        mv *.AppImage ../../${{env.EXECUTABLE}}-${{env.VERSION}}-Linux-x64.AppImage

    - name: '📤 Upload artifact: AppImage'
      uses: actions/upload-artifact@v4
      with:
        name: ${{env.EXECUTABLE}}-${{env.VERSION}}-Linux-x64.AppImage
        path: ${{env.EXECUTABLE}}-${{env.VERSION}}-Linux-x64.AppImage

#-------------------------------------------------------------------------------
# GNU/Linux build (aarch64)
#-------------------------------------------------------------------------------

